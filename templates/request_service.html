{% extends "base_dashboard.html" %} {% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-primary text-white text-center py-4 rounded-top-4 border-0">
                    <h3 class="fw-bold mb-1">Descreva o que você precisa</h3>
                    <p class="mb-0 opacity-75">
                        Profissional: <strong>{{ professional.user.name if professional.user else professional.name }}</strong>
                    </p>
                </div>

                <div class="card-body p-4 p-md-5 bg-white">
                    <form method="POST" action="{{ url_for('request_service', professional_id=professional.id) }}">
                        
                        <div class="mb-4">
                            <label for="title" class="form-label fw-bold text-dark">Título do Serviço</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0 shadow-sm" id="title" name="title" placeholder="Ex: Instalação de ar condicionado" required>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-bold text-dark">Descrição Detalhada</label>
                            <textarea class="form-control bg-light border-0 shadow-sm" id="description" name="description" rows="5" placeholder="Descreva aqui o que precisa ser feito em detalhes..." required></textarea>
                            <div class="form-text mt-2">
                                <i class="fas fa-shield-alt text-primary me-1"></i> <span class="text-muted"><strong>Dica de Segurança:</strong> Não compartilhe telefones ou e-mails aqui. Use o chat seguro.</span>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label for="budget" class="form-label fw-bold text-dark">Orçamento Estimado</label>
                                <div class="input-group input-group-lg shadow-sm">
                                    <span class="input-group-text bg-primary text-white border-0">R$</span>
                                    <input type="number" step="0.01" class="form-control bg-light border-0" id="budget" name="budget" placeholder="0.00" required>
                                </div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label for="preferred_date" class="form-label fw-bold text-dark">Data Preferencial</label>
                                <input type="text" class="form-control form-control-lg bg-light border-0 shadow-sm" id="preferred_date" name="preferred_date" placeholder="Ex: Próxima semana">
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="javascript:history.back()" class="btn btn-light btn-lg rounded-pill px-4 me-md-2 shadow-sm text-secondary">
                                <i class="fas fa-arrow-left me-2"></i> Voltar
                            </a>
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm">
                                <i class="fas fa-paper-plane me-2"></i> Enviar Solicitação
                            </button>
                        </div>
                        
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
