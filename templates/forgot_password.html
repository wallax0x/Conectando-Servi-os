{% extends "base.html" %}

{% block title %}Recuperar Senha - Conectando Serviços{% endblock %}

{% block extra_css %}
<script src="https://cdn.tailwindcss.com"></script>
{% endblock %}

{% block content %}
<div class="bg-gray-50 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-xl border border-gray-100">
        <div>
            <div class="flex justify-center">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-3xl">
                    <i class="fas fa-key"></i>
                </div>
            </div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Recuperar Senha
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Informe seu e-mail ou CPF para receber instruções de recuperação.
            </p>
        </div>
        <form class="mt-8 space-y-6" action="{{ url_for('recuperar_senha') }}" method="POST">
            <div class="rounded-md shadow-sm -space-y-px">
                <div>
                    <label for="identifier" class="sr-only">E-mail ou CPF</label>
                    <input id="identifier" name="identifier" type="text" required class="appearance-none rounded-2xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" placeholder="E-mail ou CPF">
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-2xl text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-300 shadow-lg shadow-blue-200">
                    Enviar Instruções
                </button>
            </div>
        </form>
        
        <div class="text-center">
            <a href="{{ url_for('login') }}" class="font-medium text-blue-600 hover:text-blue-500 transition underline">
                Voltar para o Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
